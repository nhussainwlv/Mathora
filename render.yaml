# Render Blueprint — https://github.com/nhussainwlv/Mathora
# Dashboard → New → Blueprint → connect this repo
services:
  - type: web
    name: mathora-api
    runtime: node
    plan: free
    buildCommand: >-
      npm install --include=dev &&
      cd apps/api &&
      npx prisma generate &&
      cd ../.. &&
      npm run build --workspace api &&
      cd apps/api &&
      npx prisma db push &&
      (npx prisma db seed || true)
    startCommand: cd apps/api && npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: PORT
        value: "4000"
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: APP_BASE_URL
        sync: false

  - type: web
    name: mathora-web
    runtime: static
    rootDir: apps/web
    buildCommand: echo "Static PWA — no build step"
    staticPublishPath: ./public
