<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="/js/theme.js"></script>
    <title>Sign in — Mathora</title>
  </head>
  <body class="app-gradient">
    <main class="auth-page">
      <h1>Sign in to Mathora</h1>
      <div class="api-banner" data-api-banner hidden></div>
      <p class="message">Use your <strong>email</strong> and password (not username).</p>
      <form id="signin-form" class="auth-form">
        <input class="input" type="email" name="email" placeholder="you@school.com" required autocomplete="email" />
        <input class="input" type="password" name="password" placeholder="Password" required />
        <button class="btn btn-primary btn-block" type="submit">Sign in</button>
      </form>
      <p class="message"><a href="/auth/signup.html">Create an account</a> · <a href="/auth/reset.html">Reset password</a></p>
      <p class="message" data-auth-message></p>
    </main>
    <script src="/js/config.js"></script>
    <script src="/js/session.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/game-progress.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/pwa.js"></script>
  </body>
</html>
