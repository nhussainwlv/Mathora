<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="/js/theme.js"></script>
    <title>Learn — Mathora</title>
  </head>
  <body>
    <div id="page-content">
      <div id="learn-page" class="learn-flow">
        <header class="learn-header">
          <h2>Learn</h2>
          <p class="message">Choose your key stage, pick a topic, then study the guide and complete 10 quiz questions.</p>
          <nav class="learn-breadcrumb" data-breadcrumb aria-label="Learn steps"></nav>
          <div class="learn-steps" data-step-indicator aria-hidden="true"></div>
        </header>

        <section class="learn-panel" data-view="stages">
          <h3 class="learn-panel-title">Choose your key stage</h3>
          <div class="learn-stage-grid" data-stages></div>
        </section>

        <section class="learn-panel learn-panel-hidden" data-view="topics">
          <h3 class="learn-panel-title" data-topics-heading>Topics</h3>
          <ul class="learn-topic-grid" data-topics></ul>
        </section>

        <section class="learn-panel learn-panel-hidden" data-view="topic">
          <div data-topic-detail></div>
          <div class="card learn-quiz-card" data-quiz></div>
        </section>

        <aside class="card learn-sources" data-sources-wrap>
          <h4>Curriculum references</h4>
          <ul class="list-stack" data-sources></ul>
        </aside>

        <p class="message" data-message></p>
      </div>
    </div>
    <script>window.MATHORA_ACTIVE = "/student/learn.html";</script>
    <script src="/js/shell.js"></script>
    <script type="module" src="/js/learn.js"></script>
    <script src="/js/pwa.js"></script>
  </body>
</html>
