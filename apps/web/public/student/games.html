<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <title>Games — Mathora</title>
  </head>
  <body>
    <div id="page-content">
      <div id="games-page">
        <div class="card">
          <h2>Maths games</h2>
          <p class="message">
            Sign in to save every question you solve. Pick a game, choose <strong>Level 1–3</strong>, then play
            30 questions per round — Submit, then Next question →.
          </p>
          <p class="message">Questions saved: <strong data-solved-count>0</strong></p>
        </div>
        <div class="grid-3" data-grid></div>
        <p class="game-status" data-message hidden></p>
      </div>
    </div>
    <script>window.MATHORA_ACTIVE = "/student/games.html";</script>
    <script src="/js/session.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/game-progress.js"></script>
    <script src="/js/app-init.js"></script>
    <script src="/js/shell.js"></script>
    <script src="/js/math-generator.js"></script>
    <script src="/js/game-banks.js"></script>
    <script src="/js/game-session.js"></script>
    <script src="/js/game-questions.js"></script>
    <script src="/js/games.js"></script>
    <script src="/js/pwa.js"></script>
  </body>
</html>
